# =============================================================================
# MixFormer-small 训练配置
# 论文设置: N=16, L=4, D=384, 282M dense params
# 用法: python train.py --config configs/experiments/mixformer_small.yaml
# =============================================================================

model:
  type: mixformer
  size: small           # N=16, L=4, D=384
  dropout: 0.0

train:
  num_epochs: 10
  batch_size: 256
  lr: 1.0e-3
  weight_decay: 1.0e-5
  optimizer: adamw
  seed: 42

data:
  max_seq_len: 512
  num_tasks: 2
  train_samples: 50000
  eval_samples: 10000
