# =============================================================================
# 长序列扩展实验配置
# 论文 Section 4.4.2 序列长度 Scaling 实验
# 用法: python train.py --config configs/experiments/long_seq_scaling.yaml
# =============================================================================

model:
  type: mixformer
  size: small
  dropout: 0.0

train:
  num_epochs: 5
  batch_size: 64
  lr: 5.0e-4
  weight_decay: 1.0e-5
  optimizer: adamw
  seed: 42

data:
  max_seq_len: 2048     # 可设为 512 / 2048 / 8192 / 10000
  num_tasks: 2
  train_samples: 50000
  eval_samples: 10000
